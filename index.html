<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zimowy Partner ❄️ — Dokumenty</title>
<style>
  :root{
    --bg:#1e1a17;
    --card:#2b2420;
    --border:#f0a83c;
    --text:#f1e9df;
    --muted:#b6ab9e;
    --accent:#5865f2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:"Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:24px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:36px 32px;
    max-width:560px;
    width:100%;
  }
  h1{
    margin:0 0 4px 0;
    font-size:1.5rem;
  }
  p.sub{
    color:var(--muted);
    margin:0 0 28px 0;
  }
  .links{
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  a.doc-link{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#33291f;
    color:var(--text);
    text-decoration:none;
    padding:14px 18px;
    border-radius:8px;
    border:1px solid transparent;
    transition:border-color .15s ease;
  }
  a.doc-link:hover{
    border-color:var(--border);
  }
  a.doc-link .arrow{
    color:var(--accent);
    font-weight:bold;
  }
  footer{
    margin-top:28px;
    font-size:0.8rem;
    color:var(--muted);
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Zimowy Partner 🤝</h1>
    <p class="sub">Dokumenty prawne bota</p>
    <div class="links">
      <a class="doc-link" href="privacy.html">
        <span>🔒 Privacy Policy</span>
        <span class="arrow">→</span>
      </a>
      <a class="doc-link" href="terms.html">
        <span>📄 Terms of Service</span>
        <span class="arrow">→</span>
      </a>
    </div>
    <footer>Ostatnia aktualizacja: 08.07.2026</footer>
  </div>
</body>
</html>
